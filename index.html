<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML MCQ Exam - بو نورة</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17; --surface: #131926; --card: #1a2234;
  --border: #2a3654; --text: #e2e8f0; --muted: #8892a8;
  --accent: #60a5fa; --accent2: #818cf8; --green: #34d399;
  --red: #f87171; --orange: #fbbf24; --pink: #f472b6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.app { display:flex; min-height:100vh; }
.sidebar { width:320px; background:var(--surface); border-right:1px solid var(--border); 
  padding:20px; overflow-y:auto; position:fixed; height:100vh; transition:transform .3s;
  z-index:100; }
.sidebar.closed { transform:translateX(-320px); }
.main { flex:1; margin-left:320px; padding:30px; max-width:900px; transition:margin .3s; }
.main.full { margin-left:0; }
.toggle-btn { position:fixed; top:15px; left:15px; z-index:200; background:var(--accent);
  border:none; color:#fff; width:40px; height:40px; border-radius:10px; cursor:pointer;
  font-size:18px; display:flex; align-items:center; justify-content:center; }
.sidebar h2 { color:var(--accent); font-size:18px; margin-bottom:15px; font-family:'JetBrains Mono'; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.stat-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center; }
.stat-box .val { font-size:24px; font-weight:700; font-family:'JetBrains Mono'; }
.stat-box .lbl { font-size:11px; color:var(--muted); margin-top:2px; }
.progress-bar { height:8px; background:var(--card); border-radius:4px; margin:10px 0; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width .5s; }
.topic-list { margin-top:15px; }
.topic-item { display:flex; justify-content:space-between; align-items:center;
  padding:8px 10px; border-radius:8px; margin:4px 0; font-size:13px; cursor:pointer;
  background:var(--card); border:1px solid var(--border); }
.topic-item:hover { border-color:var(--accent); }
.topic-item .score { font-family:'JetBrains Mono'; font-size:12px; }
.history-item { padding:10px; margin:6px 0; border-radius:8px; background:var(--card);
  border:1px solid var(--border); font-size:12px; }
.history-item .h-score { font-family:'JetBrains Mono'; font-size:16px; font-weight:700; }
canvas#chartCanvas { width:100%; height:150px; margin:10px 0; }

/* Question card */
.q-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.q-counter { font-family:'JetBrains Mono'; color:var(--accent); font-size:14px; }
.q-topic { background:var(--accent2); color:#fff; padding:4px 12px; border-radius:20px; font-size:12px; }
.q-card { background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:28px; margin-bottom:20px; }
.q-text { font-size:15px; line-height:1.8; margin-bottom:20px; white-space:pre-wrap; }
.q-img { max-width:100%; border-radius:10px; margin:12px 0; border:1px solid var(--border); }
.options { display:flex; flex-direction:column; gap:10px; }
.opt { padding:14px 18px; border:2px solid var(--border); border-radius:12px;
  cursor:pointer; transition:all .2s; font-size:14px; line-height:1.6; display:flex;
  align-items:flex-start; gap:12px; }
.opt:hover { border-color:var(--accent); background:rgba(96,165,250,.08); }
.opt.selected { border-color:var(--accent); background:rgba(96,165,250,.15); }
.opt.correct { border-color:var(--green); background:rgba(52,211,153,.12); }
.opt.wrong { border-color:var(--red); background:rgba(248,113,113,.12); }
.opt.missed { border-color:var(--orange); background:rgba(251,191,36,.08); }
.opt-letter { width:28px; height:28px; border-radius:50%; background:var(--surface);
  display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono';
  font-size:12px; font-weight:700; flex-shrink:0; }
.opt.correct .opt-letter { background:var(--green); color:#000; }
.opt.wrong .opt-letter { background:var(--red); color:#fff; }
.explanation { background:linear-gradient(135deg,rgba(52,211,153,.08),rgba(96,165,250,.08));
  border:1px solid var(--green); border-radius:12px; padding:18px; margin-top:16px;
  font-size:13px; line-height:1.7; }
.explanation h4 { color:var(--green); margin-bottom:8px; font-size:14px; }
.btn { padding:12px 28px; border:none; border-radius:10px; font-size:14px; font-weight:600;
  cursor:pointer; font-family:'Cairo'; transition:all .2s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#4a94e8; }
.btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--accent); }
.btn-success { background:var(--green); color:#000; }
.btn-row { display:flex; gap:12px; margin-top:20px; justify-content:center; flex-wrap:wrap; }
.multi-note { color:var(--orange); font-size:12px; margin-bottom:10px; font-style:italic; }

/* Start screen */
.start-screen { text-align:center; padding:60px 20px; }
.start-screen h1 { font-size:32px; color:var(--accent); margin-bottom:10px; }
.start-screen p { color:var(--muted); margin-bottom:30px; }
.start-screen .big-num { font-size:72px; font-family:'JetBrains Mono'; font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--pink));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* Results screen */
.results { text-align:center; padding:40px 20px; }
.results h1 { font-size:28px; margin-bottom:20px; }
.grade-circle { width:150px; height:150px; border-radius:50%; margin:20px auto;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  font-family:'JetBrains Mono'; border:4px solid; }
.grade-circle .pct { font-size:36px; font-weight:700; }
.grade-circle .frac { font-size:14px; }
.topic-results { text-align:left; margin:30px auto; max-width:600px; }
.topic-result-row { display:flex; justify-content:space-between; padding:8px 0;
  border-bottom:1px solid var(--border); font-size:14px; }

/* Animations */
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeIn .4s ease; }

/* Mobile */
@media(max-width:768px) {
  .sidebar { width:280px; }
  .main { margin-left:0; padding:15px; padding-top:60px; }
  .sidebar:not(.closed) ~ .main { filter:blur(2px); }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>

// ============ APP STATE ============
let state = {
  screen: 'start', // start, quiz, result
  questions: [],
  currentIdx: 0,
  answers: {}, // {qId: [selected indices]}
  submitted: {}, // {qId: true}
  attemptHistory: [], // [{date, score, total, topicScores}]
  sidebarOpen: window.innerWidth > 768,
};

function shuffle(arr) {
  let a = [...arr];
  for (let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function loadHistory() {
  try {
    const saved = localStorage.getItem('ml_exam_history');
    if (saved) state.attemptHistory = JSON.parse(saved);
  } catch(e) {}
}

function saveHistory() {
  try {
    localStorage.setItem('ml_exam_history', JSON.stringify(state.attemptHistory));
  } catch(e) {}
}

function startExam() {
  state.screen = 'quiz';
  state.questions = shuffle(QUESTIONS);
  state.currentIdx = 0;
  state.answers = {};
  state.submitted = {};
  render();
}

function toggleOption(qId, optIdx) {
  if (state.submitted[qId]) return;
  const q = QUESTIONS.find(x=>x.id===qId);
  if (!state.answers[qId]) state.answers[qId] = [];
  const arr = state.answers[qId];
  const idx = arr.indexOf(optIdx);
  if (q.multi) {
    if (idx >= 0) arr.splice(idx,1); else arr.push(optIdx);
  } else {
    state.answers[qId] = [optIdx];
  }
  render();
}

function submitAnswer(qId) {
  state.submitted[qId] = true;
  render();
}

function nextQuestion() {
  if (state.currentIdx < state.questions.length - 1) {
    state.currentIdx++;
    render();
    window.scrollTo(0,0);
  }
}

function prevQuestion() {
  if (state.currentIdx > 0) {
    state.currentIdx--;
    render();
    window.scrollTo(0,0);
  }
}

function finishExam() {
  // Calculate scores
  let correct = 0;
  const topicScores = {};
  QUESTIONS.forEach(q => {
    if (!topicScores[q.topic]) topicScores[q.topic] = {correct:0,total:0};
    topicScores[q.topic].total++;
    const userAns = (state.answers[q.id] || []).sort().join(',');
    const correctAns = q.ans.sort().join(',');
    if (userAns === correctAns) { correct++; topicScores[q.topic].correct++; }
  });
  
  state.attemptHistory.push({
    date: new Date().toLocaleDateString('en-GB'),
    time: new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
    score: correct,
    total: QUESTIONS.length,
    topicScores
  });
  saveHistory();
  state.screen = 'result';
  render();
}

function isCorrect(qId) {
  const q = QUESTIONS.find(x=>x.id===qId);
  const userAns = (state.answers[qId] || []).sort().join(',');
  return userAns === q.ans.sort().join(',');
}

function getTopics() {
  const topics = {};
  QUESTIONS.forEach(q => {
    if (!topics[q.topic]) topics[q.topic] = 0;
    topics[q.topic]++;
  });
  return topics;
}

function renderSidebar() {
  const topics = getTopics();
  const answeredCount = Object.keys(state.submitted).length;
  const correctCount = Object.keys(state.submitted).filter(id => isCorrect(parseInt(id))).length;
  const pct = answeredCount ? Math.round(correctCount/answeredCount*100) : 0;
  
  let historyHTML = '';
  state.attemptHistory.slice(-5).reverse().forEach((h,i) => {
    const hpct = Math.round(h.score/h.total*100);
    const color = hpct >= 80 ? 'var(--green)' : hpct >= 60 ? 'var(--orange)' : 'var(--red)';
    historyHTML += '<div class="history-item"><div style="display:flex;justify-content:space-between;align-items:center;"><span class="h-score" style="color:'+color+'">${hpct}%</span><span style="color:var(--muted)">${h.date} ${h.time}</span></div><div style="color:var(--muted);margin-top:4px">${h.score}/${h.total} correct</div></div>'.replace(/\$\{hpct\}/g,hpct).replace('${h.date}',h.date).replace('${h.time}',h.time).replace('${h.score}',h.score).replace('${h.total}',h.total);
  });

  // Draw mini chart
  let chartHTML = '';
  if (state.attemptHistory.length > 0) {
    chartHTML = '<canvas id="chartCanvas" width="280" height="150"></canvas>';
  }

  let topicHTML = '';
  if (state.screen === 'quiz') {
    Object.entries(topics).forEach(([topic, count]) => {
      const answered = state.questions.filter(q => q.topic===topic && state.submitted[q.id]).length;
      const correct = state.questions.filter(q => q.topic===topic && state.submitted[q.id] && isCorrect(q.id)).length;
      const color = answered === 0 ? 'var(--muted)' : correct/answered >= 0.8 ? 'var(--green)' : correct/answered >= 0.5 ? 'var(--orange)' : 'var(--red)';
      topicHTML += '<div class="topic-item"><span>'+topic+'</span><span class="score" style="color:'+color+'">'+correct+'/'+answered+'</span></div>';
    });
  }

  return '<div class="sidebar '+(state.sidebarOpen?'':'closed')+'" id="sidebar">' +
    '<h2>📊 Statistics</h2>' +
    (state.screen === 'quiz' ? 
      '<div class="stat-grid">' +
        '<div class="stat-box"><div class="val" style="color:var(--accent)">'+answeredCount+'</div><div class="lbl">Answered</div></div>' +
        '<div class="stat-box"><div class="val" style="color:'+(pct>=80?'var(--green)':pct>=60?'var(--orange)':'var(--red)')+'">'+pct+'%</div><div class="lbl">Accuracy</div></div>' +
        '<div class="stat-box"><div class="val" style="color:var(--green)">'+correctCount+'</div><div class="lbl">Correct</div></div>' +
        '<div class="stat-box"><div class="val" style="color:var(--red)">'+(answeredCount-correctCount)+'</div><div class="lbl">Wrong</div></div>' +
      '</div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:'+Math.round(answeredCount/QUESTIONS.length*100)+'%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div>' +
      '<div style="text-align:center;font-size:12px;color:var(--muted)">'+answeredCount+' / '+QUESTIONS.length+' questions</div>' +
      '<div class="topic-list" style="margin-top:15px"><h2 style="font-size:14px;margin-bottom:8px">📚 Topics</h2>'+topicHTML+'</div>'
    : '') +
    '<div style="margin-top:20px"><h2 style="font-size:14px;margin-bottom:8px">📈 History</h2>' +
    (state.attemptHistory.length === 0 ? '<div style="color:var(--muted);font-size:13px">No attempts yet</div>' : chartHTML + historyHTML) +
    '</div></div>';
}

function drawChart() {
  const canvas = document.getElementById('chartCanvas');
  if (!canvas || state.attemptHistory.length === 0) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  
  const data = state.attemptHistory.map(h => Math.round(h.score/h.total*100));
  const maxPts = Math.min(data.length, 10);
  const pts = data.slice(-maxPts);
  
  // Grid
  ctx.strokeStyle = '#2a3654'; ctx.lineWidth = 0.5;
  for (let y=0;y<=100;y+=25) {
    const py = H - 20 - (y/100)*(H-30);
    ctx.beginPath(); ctx.moveTo(30,py); ctx.lineTo(W-10,py); ctx.stroke();
    ctx.fillStyle = '#8892a8'; ctx.font = '10px JetBrains Mono';
    ctx.fillText(y+'%', 2, py+4);
  }
  
  // Line
  if (pts.length > 1) {
    const step = (W-50) / (pts.length-1);
    ctx.beginPath();
    ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 2;
    pts.forEach((v,i) => {
      const x = 35 + i*step, y = H - 20 - (v/100)*(H-30);
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
    
    // Dots
    pts.forEach((v,i) => {
      const x = 35 + i*step, y = H - 20 - (v/100)*(H-30);
      ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle = v>=80?'#34d399':v>=60?'#fbbf24':'#f87171';
      ctx.fill();
    });
  } else if (pts.length === 1) {
    const x = W/2, y = H - 20 - (pts[0]/100)*(H-30);
    ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2);
    ctx.fillStyle = pts[0]>=80?'#34d399':pts[0]>=60?'#fbbf24':'#f87171';
    ctx.fill();
  }
}

function render() {
  const app = document.getElementById('app');
  let html = '<button class="toggle-btn" onclick="state.sidebarOpen=!state.sidebarOpen;render()">☰</button>';
  html += renderSidebar();
  html += '<div class="main '+(state.sidebarOpen?'':'full')+'">';
  
  if (state.screen === 'start') {
    html += '<div class="start-screen fade-in">' +
      '<div class="big-num">101</div>' +
      '<h1>ML Exam</h1>' +
      '<p style="font-size:16px">Machine Learning MCQ — Complete Exam</p>' +
      '<p>15 topics • Shuffled questions • Instant feedback with explanations</p>' +
      '<div style="margin:30px 0">' +
      Object.entries(getTopics()).map(([t,c]) => '<span style="display:inline-block;background:var(--card);border:1px solid var(--border);padding:4px 12px;border-radius:20px;margin:3px;font-size:12px">'+t+' ('+c+')</span>').join('') +
      '</div>' +
      '<button class="btn btn-primary" style="font-size:18px;padding:16px 48px" onclick="startExam()">🚀 Start Exam</button>' +
      '</div>';
  }
  
  else if (state.screen === 'quiz') {
    const q = state.questions[state.currentIdx];
    const isSubmitted = state.submitted[q.id];
    const userAns = state.answers[q.id] || [];
    
    html += '<div class="fade-in">';
    html += '<div class="q-header"><span class="q-counter">Q' + (state.currentIdx+1) + ' / ' + state.questions.length + '</span>';
    html += '<span class="q-topic">' + q.topic + '</span></div>';
    
    html += '<div class="q-card">';
    if (q.multi) html += '<div class="multi-note">⚡ Select ALL that apply</div>';
    html += '<div class="q-text">' + q.q + '</div>';
    
    if (q.img && IMG[q.img]) {
      html += '<img class="q-img" src="'+IMG[q.img]+'" alt="Question figure" />';
    }
    
    html += '<div class="options">';
    q.opts.forEach((opt, i) => {
      let cls = 'opt';
      if (isSubmitted) {
        if (q.ans.includes(i) && userAns.includes(i)) cls += ' correct';
        else if (userAns.includes(i) && !q.ans.includes(i)) cls += ' wrong';
        else if (q.ans.includes(i) && !userAns.includes(i)) cls += ' missed';
      } else if (userAns.includes(i)) {
        cls += ' selected';
      }
      const letter = String.fromCharCode(65+i);
      html += '<div class="'+cls+'" onclick="toggleOption('+q.id+','+i+')">';
      html += '<span class="opt-letter">'+letter+'</span>';
      html += '<span>'+opt+'</span></div>';
    });
    html += '</div>';
    
    if (isSubmitted) {
      const correct = isCorrect(q.id);
      html += '<div class="explanation"><h4>'+(correct?'✅ Correct!':'❌ Incorrect')+'</h4>' + q.exp + '</div>';
    }
    
    html += '</div>';
    
    html += '<div class="btn-row">';
    if (state.currentIdx > 0) html += '<button class="btn btn-secondary" onclick="prevQuestion()">← Previous</button>';
    if (!isSubmitted && userAns.length > 0) {
      html += '<button class="btn btn-primary" onclick="submitAnswer('+q.id+')">Submit Answer</button>';
    }
    if (isSubmitted && state.currentIdx < state.questions.length - 1) {
      html += '<button class="btn btn-primary" onclick="nextQuestion()">Next →</button>';
    }
    if (isSubmitted && Object.keys(state.submitted).length === state.questions.length) {
      html += '<button class="btn btn-success" onclick="finishExam()">🏁 Finish Exam</button>';
    } else if (isSubmitted && state.currentIdx === state.questions.length - 1) {
      const remaining = state.questions.length - Object.keys(state.submitted).length;
      if (remaining > 0) html += '<div style="color:var(--orange);font-size:13px;margin-top:10px">'+remaining+' questions remaining</div>';
      else html += '<button class="btn btn-success" onclick="finishExam()">🏁 Finish Exam</button>';
    }
    html += '</div></div>';
  }
  
  else if (state.screen === 'result') {
    const attempt = state.attemptHistory[state.attemptHistory.length - 1];
    const pct = Math.round(attempt.score / attempt.total * 100);
    const color = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--orange)' : 'var(--red)';
    
    html += '<div class="results fade-in">';
    html += '<h1>📊 Exam Results</h1>';
    html += '<div class="grade-circle" style="border-color:'+color+'"><span class="pct" style="color:'+color+'">'+pct+'%</span><span class="frac" style="color:var(--muted)">'+attempt.score+'/'+attempt.total+'</span></div>';
    
    html += '<div class="topic-results">';
    html += '<h3 style="margin-bottom:15px;color:var(--accent)">Topic Breakdown</h3>';
    Object.entries(attempt.topicScores).sort((a,b)=>a[1].correct/a[1].total - b[1].correct/b[1].total).forEach(([topic, s]) => {
      const tpct = Math.round(s.correct/s.total*100);
      const tc = tpct>=80?'var(--green)':tpct>=60?'var(--orange)':'var(--red)';
      html += '<div class="topic-result-row"><span>'+topic+'</span><span style="font-family:JetBrains Mono;color:'+tc+'">'+s.correct+'/'+s.total+' ('+tpct+'%)</span></div>';
    });
    html += '</div>';
    
    html += '<div class="btn-row" style="margin-top:30px">';
    html += '<button class="btn btn-primary" onclick="startExam()">🔄 Retake Exam</button>';
    html += '<button class="btn btn-secondary" onclick="state.screen=\'start\';render()">🏠 Home</button>';
    html += '</div></div>';
  }
  
  html += '</div>';
  app.innerHTML = html;
  
  setTimeout(drawChart, 100);
}

// Init
loadHistory();
render();
</script>
</body>
</html>
